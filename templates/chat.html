<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЧАТ ХАКЕРОВ | HACKER SIMULATOR</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="user-info">
                <span class="username" id="username">Загрузка...</span>
                <span class="mask" id="mask">🎭 #1</span>
            </div>
            <div class="balances">
                <div class="balance-item">
                    <span class="balance-label">💰 CODE</span>
                    <span class="balance-value" id="code-balance">0</span>
                </div>
                <div class="balance-item">
                    <span class="balance-label">💎 HACK</span>
                    <span class="balance-value" id="hack-balance">0</span>
                </div>
            </div>
        </div>
        
        <!-- Chat Content -->
        <div class="content-header">
            <h1 class="page-title">💬 ЧАТ ХАКЕРОВ</h1>
            <div class="chat-info">
                Следи за утечками данных!
            </div>
        </div>
        
        <!-- Chat Messages -->
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="loading-spinner"></div>
            </div>
            
            <!-- Chat Input -->
            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="Введите сообщение..." maxlength="200">
                <button id="send-btn" onclick="sendMessage()">
                    ➤
                </button>
            </div>
        </div>
        
        <!-- Navigation -->
        <div class="nav-menu">
            <div class="nav-item" onclick="navigateTo('index')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </div>
            <div class="nav-item" onclick="navigateTo('upgrades')">
                <span class="nav-icon">🛠️</span>
                <span class="nav-label">Улучшения</span>
            </div>
            <div class="nav-item" onclick="navigateTo('exchange')">
                <span class="nav-icon">📈</span>
                <span class="nav-label">Биржа</span>
            </div>
            <div class="nav-item" onclick="navigateTo('p2p')">
                <span class="nav-icon">🤝</span>
                <span class="nav-label">P2P</span>
            </div>
            <div class="nav-item" onclick="navigateTo('leaderboard')">
                <span class="nav-icon">🏆</span>
                <span class="nav-label">Топ</span>
            </div>
            <div class="nav-item" onclick="navigateTo('chat')" data-active="true">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Чат</span>
            </div>
            <div class="nav-item" onclick="navigateTo('profile')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Профиль</span>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script src="/static/js/anticheat-client.js"></script>
    <script src="/static/js/animations.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>

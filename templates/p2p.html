<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P РЫНОК | HACKER SIMULATOR</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="user-info">
                <span class="username" id="username">Загрузка...</span>
                <span class="mask" id="mask">🎭 #1</span>
            </div>
            <div class="balances">
                <div class="balance-item">
                    <span class="balance-label">💰 CODE</span>
                    <span class="balance-value" id="code-balance">0</span>
                </div>
                <div class="balance-item">
                    <span class="balance-label">💎 HACK</span>
                    <span class="balance-value" id="hack-balance">0</span>
                </div>
            </div>
        </div>
        
        <!-- P2P Content -->
        <div class="content-header">
            <h1 class="page-title">🤝 P2P РЫНОК</h1>
            <div class="commission-info">Комиссия: 2%</div>
        </div>
        
        <!-- Create Order Form -->
        <div class="create-order-section">
            <h3>СОЗДАТЬ ОРДЕР</h3>
            <div class="order-form">
                <div class="input-group">
                    <input type="number" id="order-amount" placeholder="Количество $HACK" min="10" step="1">
                    <span class="input-suffix">$HACK</span>
                </div>
                <div class="input-group">
                    <input type="number" id="order-price" placeholder="Цена за 1 $HACK" min="1" step="1">
                    <span class="input-suffix">$CODE</span>
                </div>
                <button class="create-order-btn" onclick="createOrder()" id="create-order-btn">
                    ВЫСТАВИТЬ ОРДЕР
                </button>
            </div>
        </div>
        
        <!-- Active Orders -->
        <div class="orders-section">
            <h3>АКТИВНЫЕ ОРДЕРА</h3>
            <div class="orders-list" id="orders-list">
                <div class="loading-spinner"></div>
            </div>
        </div>
        
        <!-- My Orders (optional) -->
        <div class="my-orders-section">
            <h3>МОИ ОРДЕРА</h3>
            <div class="my-orders-list" id="my-orders-list"></div>
        </div>
        
        <!-- Navigation -->
        <div class="nav-menu">
            <div class="nav-item" onclick="navigateTo('index')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </div>
            <div class="nav-item" onclick="navigateTo('upgrades')">
                <span class="nav-icon">🛠️</span>
                <span class="nav-label">Улучшения</span>
            </div>
            <div class="nav-item" onclick="navigateTo('exchange')">
                <span class="nav-icon">📈</span>
                <span class="nav-label">Биржа</span>
            </div>
            <div class="nav-item" onclick="navigateTo('p2p')" data-active="true">
                <span class="nav-icon">🤝</span>
                <span class="nav-label">P2P</span>
            </div>
            <div class="nav-item" onclick="navigateTo('leaderboard')">
                <span class="nav-icon">🏆</span>
                <span class="nav-label">Топ</span>
            </div>
            <div class="nav-item" onclick="navigateTo('chat')">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Чат</span>
            </div>
            <div class="nav-item" onclick="navigateTo('profile')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Профиль</span>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script src="/static/js/anticheat-client.js"></script>
    <script src="/static/js/animations.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/p2p.js"></script>
</body>
</html>

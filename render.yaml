services:
  - type: web
    name: hacker-simulator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webapp:app --bind 0.0.0.0:$PORT & python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hacker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_IDS
        value: "1175194423"
      - key: WEBAPP_URL
        value: https://hacker-simulator-bot.onrender.com

databases:
  - name: hacker-db
    plan: free

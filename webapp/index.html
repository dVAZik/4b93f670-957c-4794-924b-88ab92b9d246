<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 Casino Mini App</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <header>
            <div class="balance-container">
                <span class="balance-label">💰 Баланс</span>
                <span class="balance-value" id="balance">0</span>
            </div>
            <button class="bonus-btn" id="dailyBonus">🎁 +200</button>
        </header>
        
        <main>
            <h1 class="neon-title">🎮 ИГРЫ</h1>
            
            <div class="games-grid" id="gamesGrid">
                <!-- Игры будут загружены через JS -->
            </div>
        </main>
        
        <footer>
            <p class="footer-text">🎲 Удачи в игре!</p>
        </footer>
    </div>
    
    <script src="/app.js"></script>
</body>
</html>
